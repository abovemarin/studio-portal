name: CI

# Runs the full check suite on every push and PR. A red run blocks merge
# (branch protection on `master` requires the `verify` job to pass).
on:
  push:
    branches: [master]
  pull_request:

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest

    # Real ephemeral Postgres for the integration tests (7.1 harness). The unit project ignores it;
    # the integration project connects via TEST_DATABASE_URL below and builds its schema by running
    # the real migrations on this fresh DB.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: studio_portal_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      # pnpm version is pinned via package.json#packageManager.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Cheapest / most common failures first; build (slowest) last. Fail-fast:
      # the first failing step stops the job.
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
        env:
          # Throwaway DB whose name ends in _test (harness safety rail). Local dev uses
          # .env.test.local; CI uses the services container above.
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/studio_portal_test

      # `pnpm build` imports route modules, which import lib/db -> lib/env, and
      # lib/env validates process.env at module load. The build also runs as
      # NODE_ENV=production, so RESEND_API_KEY is required too. These are dummy
      # values only — no real database is contacted (the postgres client connects
      # lazily, never during the build).
      - run: pnpm build
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          BETTER_AUTH_SECRET: ci-dummy-secret-do-not-use-0123456789abcdef
          BETTER_AUTH_URL: http://localhost:3000
          EMAIL_FROM: ci@example.com
          RESEND_API_KEY: dummy
